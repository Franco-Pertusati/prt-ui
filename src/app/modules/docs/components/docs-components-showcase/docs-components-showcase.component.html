<div class="relative h-64 grid place-items-center">
  <div
    class="flex gap-2 items-center p-4 bg-neutral rounded-2xl w-fit col-span-3 h-fit absolute -top-3 -left-4"
  >
    <span>Press </span>
    <app-kbd-group>
      <app-kbd>Ctrl</app-kbd>
      +
      <app-kbd>C</app-kbd>
    </app-kbd-group>
    <span> to change the theme. </span>
    <i class="material-symbols-rounded">info</i>
  </div>
  <div class="absolute -right-10 top-1/2">
    <prt-radio
      [options]="radioOptions"
      containerClasses="flex gap-2 p-1 border-border border w-fit rounded-2xl"
      selectedValue="1"
    />
  </div>
  <div
    class="flex gap-1 items-center p-1 bg-neutral rounded-2xl w-fit absolute -bottom-2 -right-4"
  >
    <span class="mx-2">Your current plan allows you to add up to 3 LLMs</span>
    <app-counter [minValue]="0" [maxValue]="3" />
  </div>
  <div class="absolute top-4 right-0">
    <prt-button icon="breakfast_dining" variant="default" label="Toasts?" />
  </div>
  <div class="absolute left-4">
    <app-theme-toggle-btn variant="secondary" />
  </div>
  <div
    class="h-32 w-32 mx-auto grid rounded-2xl place-items-center border border-border"
  >
    <span class="text-2xl font-bold">PRTUI</span>
  </div>
</div>
