<div [class]="containerClasses()" style="position: relative">
  @if (slidingStyle()) {
    <div
      [class]="'sliding-indicator ' + indicatorClass()"
      [ngStyle]="slidingStyle()"
    ></div>
  }

  @for (option of options(); track option.value) {
    <label
      [class]="getOptionClasses(option)"
      #optionLabel
      [attr.data-value]="option.value"
    >
      @if (showIcon() && getDisplayIcon(option)) {
        <div [class]="getIconClasses()">
          <i class="material-symbols-rounded">{{ getDisplayIcon(option) }}</i>
        </div>
      }

      @if (showLabel() && option.label) {
        <span [class]="getLabelClasses(option)">
          {{ getDisplayLabel(option) }}
        </span>
      }

      <input
        type="radio"
        [name]="'radio-group'"
        [value]="option.value"
        [checked]="selectedValue() === option.value"
        [disabled]="option.disabled"
        (change)="onSelect(option)"
        class="sr-only"
      />
    </label>
  }
</div>
