@let btn =
  {
    label: label(),
    icon: icon(),
    showLabel: showLabel(),
    showIcon: showIcon(),
    hoverIcon: hoverIcon(),
    hoverIconPosition: hoverIconPosition(),
    tooltip: tooltip(),
  };

<div class="prt-button-wrapper">
  <button
    [class]="classes()"
    [disabled]="disabled()"
    [attr.aria-label]="computedAriaLabel()"
    [attr.aria-describedby]="
      ariaDescribedBy() || (btn.tooltip ? 'tooltip-' + label() : null)
    "
    [attr.aria-disabled]="disabled()"
    (click)="!disabled() && btnClick.emit()"
  >
    <!-- Hover icon: left position -->
    @if (btn.hoverIcon && btn.hoverIconPosition === "left") {
      <i
        class="material-symbols-rounded prt-hover-icon prt-hover-icon--left"
        aria-hidden="true"
      >
        {{ btn.hoverIcon }}
      </i>
    }

    <!-- Static icon -->
    @if (btn.showIcon && btn.icon) {
      <i class="material-symbols-rounded" aria-hidden="true">{{ btn.icon }}</i>
    }

    <!-- Label -->
    @if (btn.showLabel && btn.label) {
      <span>{{ btn.label }}</span>
    }

    <!-- Hover icon: right position -->
    @if (btn.hoverIcon && btn.hoverIconPosition === "right") {
      <i
        class="material-symbols-rounded prt-hover-icon prt-hover-icon--right"
        aria-hidden="true"
      >
        {{ btn.hoverIcon }}
      </i>
    }
  </button>

  <!-- Tooltip -->
  @if (btn.tooltip) {
    <span [id]="'tooltip-' + label()" [class]="tooltipClasses()" role="tooltip">
      {{ btn.tooltip }}
    </span>
  }
</div>

<style>
  /* ─── Wrapper ─────────────────────────────────────────────────────────────── */
  .prt-button-wrapper {
    position: relative;
    display: inline-flex;
  }

  /* ─── Hover icon ──────────────────────────────────────────────────────────── */
  .prt-hover-icon {
    opacity: 0;
    transition:
      opacity 150ms ease,
      transform 150ms ease;
  }

  .prt-hover-icon--left {
    transform: translateX(6px);
  }

  .prt-hover-icon--right {
    transform: translateX(-6px);
  }

  button:hover .prt-hover-icon,
  button:focus-visible .prt-hover-icon {
    opacity: 1;
    transform: translateX(0);
  }

  /* ─── Tooltip ─────────────────────────────────────────────────────────────── */
  .prt-tooltip {
    position: absolute;
    z-index: 50;
    white-space: nowrap;
    border-radius: 6px;
    padding: 4px 8px;
    font-size: 0.75rem;
    font-weight: 500;
    line-height: 1.4;
    pointer-events: none;

    /* Hidden by default */
    opacity: 0;
    transition: opacity 150ms ease;
  }

  .prt-button-wrapper:hover .prt-tooltip,
  button:focus-visible ~ .prt-tooltip {
    opacity: 1;
  }

  /* Positions */
  .tooltip-top {
    bottom: calc(100% + 6px);
    left: 50%;
    transform: translateX(-50%);
  }

  .tooltip-bottom {
    top: calc(100% + 6px);
    left: 50%;
    transform: translateX(-50%);
  }

  .tooltip-left {
    right: calc(100% + 6px);
    top: 50%;
    transform: translateY(-50%);
  }

  .tooltip-right {
    left: calc(100% + 6px);
    top: 50%;
    transform: translateY(-50%);
  }

  /* ─── Reduced motion ──────────────────────────────────────────────────────── */
  @media (prefers-reduced-motion: reduce) {
    .prt-hover-icon,
    .prt-tooltip {
      transition: none;
    }
  }
</style>
